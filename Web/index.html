<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Overlay v0.3.08.0317</title>

<script>

// initialises last track as null on start
let lastTrackID = null;
let trackID = null;

// initialises a boolean to check if the song has changed
let trackChanged = false;

// timer/progress bar variables
let currentProgress, lastPercentage = 0;
let duration, tempProgress = 1;
let lastUpdateTime = Date.now();

// initialises a boolean for pause state
let isPaused = false;

// initialises global variables (websocket + all the elements)
let ws, player, cover, titleElement, artistElement, albumElement, bar, timer;

// waits for the HTML to be fully loaded, then loads the rest
document.addEventListener("DOMContentLoaded", () => {
    // sets constants from elements 
    player = document.getElementById("player");
    cover = document.getElementById("cover");
    titleElement = document.getElementById("title");
    artistElement = document.getElementById("artist");
    albumElement = document.getElementById("album");
    bar = document.getElementById("bar");
    timer = document.getElementById("timer");

    // start the animation function
    progressAnimation();

    // grabs the config.json file
    fetch("/config.json")

        // loads the config options
        .then(res => res.json())
        .then(Config =>{

        // sets all the variables that the elements use based on config.json
        // player size + opacity
        document.documentElement.style.setProperty("--playerWidth", Config.playerWidth + "px");
        document.documentElement.style.setProperty("--playerHeight", Config.playerHeight + "px")
        document.documentElement.style.setProperty("--playerOpacity", Config.playerOpacity);
        // title styling
        document.documentElement.style.setProperty("--titleStyle", Config.titleStyle);
        document.documentElement.style.setProperty("--titleWeight", Config.titleWeight);
        document.documentElement.style.setProperty("--titleColor", Config.titleColor);
        // album, artist, timer styling
        document.documentElement.style.setProperty("--supportStyles", Config.supportStyles);
        document.documentElement.style.setProperty("--supportWeights", Config.supportWeights);
        document.documentElement.style.setProperty("--supportColors", Config.supportColors);
        // player border style
        document.documentElement.style.setProperty("--borderStyle", Config.borderStyle);
        document.documentElement.style.setProperty("--borderColor", Config.borderColor);
        // progress bar style
        document.documentElement.style.setProperty("--pbcNorm", Config.progressBarColor);
        document.documentElement.style.setProperty("--pbcPause", Config.progressBarPaused);

        // stores the scrolling boolean
        const enableScrolling = Config.enableScrolling;
        
        // saves the http port as a constant
        const wsPort = Config.httpPort;
        // creates a websocket to that port
        ws = new WebSocket(`ws://127.0.0.1:${wsPort}/ws`);
        
        // debug/console printing in browser
        ws.onopen = () => {
            console.log("Websocket connected!");
        };
        ws.onerror = (err) => {
            console.error("Websocket error: ", err);
        };
        ws.onclose = (evt) => {
            console.warn("Websocket closed: ", evt);
        };

        // when it gets a new "message" (package) from python
        ws.onmessage = (event) => {
        // opens and stores the data
        const data = JSON.parse(event.data);

        // stores a "track ID" from the text fields + duration (timestamp)
        trackID = data.title + data.artist + data.album + String(data.duration);

        // if the last "track ID" doesn't match the current one
        if(lastTrackID !== trackID){
            // sets the temp variable to match
            lastTrackID = trackID;

            // fades in a new song's info
            player.style.opacity = 0;
            setTimeout(()=> player.style.opacity = 1, 50);

            // reset progress (bar)
            currentProgress = data.progress || 0;
            duration = data.duration || 1;

            // sets the flag for track changing to true
            trackChanged = true;
        }
        // if the track ID is the same
        else {
            // sets the flag for track checking to true
            trackChanged = false;
        }

        // check for paused state
        isPaused = data.paused;
        // adds/removes the paused element type
        if(isPaused) player.classList.add("paused");
        else player.classList.remove("paused");

        // grabs the text contents from the data file and turns into elements
        titleElement.textContent = data.title || "";
        artistElement.textContent = data.artist || "";
        albumElement.textContent = data.album || "";

        // grabs the album cover picture
        if(data.cover) cover.src = data.cover;

        // if the text scrolling is enabled
        if (enableScrolling) {
            // uses the length-checking function to check the size of the text fields
            checkTextSize(titleElement);
            checkTextSize(artistElement);
            checkTextSize(albumElement);
        }

        // grabs the progress and duration (if neither is undefined)
        if(data.progress !== undefined && data.duration !== undefined){
            // checks if the song is paused
            if (!isPaused) {
                // only updates the fields if the song *isn't* updated
                currentProgress = data.progress;
                // has a fallback of 1s to avoid breaking it
                duration = data.duration || 1;
            }
        }

        // fade in animation on load 
        player.style.opacity = 1;

        // set last update time
        lastUpdateTime = Date.now();
        };
    });
});

</script>

<div id="player">
    <div id="background"></div>
    <img id="cover" src="">
    <div id="info">
        <div class="text-wrapper">
            <div class="title" id="title"></div>
        </div>
        <div class="text-wrapper">
            <div class="artist" id="artist"></div>
        </div>
        <div class="text-wrapper"></div>
            <div class="album" id="album"></div>
        <div id="progress-container">
            <div id="progress"><div id="bar"></div></div>
            <div id="timer">0:00 / 0:00</div>
        </div>
    </div>
</div>

<style>

    /* how much "padding" there is between each element (text, bar, picture) */

    /* where to place the player (X=0, Y=0 puts it in the top left corner */
    transform: translateY(0px);
    transform: translateX(0px);
    /* short fade-in animation */
    transition: opacity 1s;
    /* when the ws loads, it applies an opacity, the opacity here is how see-through it is *before* that */

}

}

}

#bar {

}

    animation: scrollAlbum 25s linear infinite alternate;

        /* starts at 0% (normal position) */
        transform: translateX(0%);
    }

        /* stays there for 10% of the duration */
        transform: translateX(0%);
    }

        /* moves to 100% of the total width to the left (so the full string can display, but doesn't fully go away */
        transform: translateX(-100%);

    0% {

        transform: translateX(0%);
    }

        transform: translateX(-40%);
    }

        /* stays there for 10% of the duration */
        transform: translateX(0%);

        /* moves to 60% of the total width to the left (so the full string can display, but doesn't fully go away */
        transform: translateX(-40%);
    }

<script>

// check if any fields exceed the player size (whether they should scroll)
function checkTextSize(element) {
    // makes variables (constants) from the passed elements
    const elementWidth = element.scrollWidth;
    const parentWidth = element.parentElement.offsetWidth;

    // checks the width of the passed element against the "parent element" (the element that stores the passed element)
    if (elementWidth > parentWidth) {
        // if the element is wider, checks if the field already is scrolling
        if (!element.classList.contains("scrolling")){
            // enables scrolling
            element.classList.add("scrolling");
        }
    } else {
        // if it's not wider, disables it
        element.classList.remove("scrolling");
    }
}

// seconds to timers
function timeFormat(sec) {
    // calculates the minutes by dividing seconds by 60
    const min = Math.floor(sec / 60);
    // calculates seconds by doing divmod of seconds/60, then turning into a string and ensuring there's always 2 numbers (02, 13, etc)
    const secs = Math.floor(sec % 60).toString().padStart(2, "0");
    // returns the minutes and seconds, formatted, to the calling function
    return `${min}:${secs}`;
}

// progress bar animation
function progressAnimation() {
    // checks if the progress bar and timer elements are ready
    if (!bar || !timer) {
        // requests animation if yes
        requestAnimationFrame(progressAnimation);
        return;
    }
    // stores the current time (-2 to help with some offset)
    const now = (Date.now()-2);
    // calculates how long it's been since last update, turns into seconds
    const elapsed = (now - lastUpdateTime) / 1000;
    // sets the last update to current time
    lastUpdateTime = now;

    // checks if the player is paused (more accurately, if it's not)
    if (!isPaused) {
        
        // adds the elapsed time to a temp
        tempProgress += elapsed;

        // ensures the track hasn't changed and that adding the elapsed time results in a higher number (prevents the clock from going down)
        if (!trackChanged && currentProgress < tempProgress) {
            // adds the passed time to current time (updating where the bar should be)
            currentProgress += elapsed;
            // sets the temp variable to match
            tempProgress = currentProgress;
        }
        // checks if the song's timer has run out, enforces a cap to the timer
        if (currentProgress > duration) {
            // sets the progress to match the length of the song, so that it doesn't go over
            currentProgress = duration;
        }
        // saves the last % the progress was at (so when it pauses it doesn't tilt)
        lastPercentage = (currentProgress / duration) * 100;
    }

    // calculates the progress bar percentage based off last percentage saved
    bar.style.width = Math.min(100, lastPercentage) + "%";

    // timer update (calls timeFormat on both the current time and the duration)
    timer.textContent = `${timeFormat(currentProgress)} / ${timeFormat(duration)}`;

    // updates the animation for the progress things (bar + timer) based on new data
    requestAnimationFrame(progressAnimation);
}

</script>
</body>

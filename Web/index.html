<script>


// initialises last track, player timeout start and playerIntervalID as null on start
let lastTrackID = null, startTime = null, playerIntervalID = null;

// timer/progress bar variables
let currentProgress = 0, lastPercentage = 0;
let duration = 1, tempProgress = 1;
let lastUpdateTime = Date.now();

// initialises player visual variables
let maxInfoSize = 0, playerTimeout = 0, outerX = 0, outerY = 0;

// initialises a boolean for pause state stuff
let isPaused = false, isHidden = false;

// initialises global variables (websocket + all the elements)
let ws, player, cover, fakeBorder, background, titleElement, artistElement, albumElement, bar, timer;

// initialises global color variables
let defaultTitleColor, defaultSupportColors, defaultBorderColor, defaultProgressColor;

// initialises widths for player 
let playerWidthRaw = 0, playerHeightRaw = 0;

// defines the keyframes and color array (empty, will be filled on load)
let KF, KFcolors;

// waits for the HTML to be fully loaded, then loads the rest
document.addEventListener("DOMContentLoaded", () => {
    // updates global constants to match elements 
    player = document.getElementById("player");
    cover = document.getElementById("cover");
    fakeBorder = document.getElementById("fakeBorder");
    background = document.getElementById("background");
    titleElement = document.getElementById("title");
    artistElement = document.getElementById("artist");
    albumElement = document.getElementById("album");
    bar = document.getElementById("bar");
    timer = document.getElementById("timer");

    // calls the animation function to start the progress bar
    progressAnimation();

    // grabs the config.json file (sent by SBO-WS.exe during startup)
    // you can see this if you go to localhost:(httpPort)/config.json (httpPort being the config port)
    fetch("/config.json", {cache: "no-store"})

        // loads the config options as Config
        .then(res => {
            // if the file isn't loaded properly
            if (!res.ok) {
                // sends error to log
                throw new Error("Failed to get config.json");
            }
            // otherwise, returns the json file
            return res.json();
        })
        // reads the config
        .then(Config => {

        // sets all the variables that the elements use based on loaded config.json file
        
        // stores the config colors in these "default variables"
        defaultTitleColor = Config.titleColor;
        defaultSupportColors = Config.supportColors;
        defaultProgressColor = Config.progressBarColor;
        defaultBorderColor = Config.borderColor;

        const elementID = "spinner";

        // calls the gradientCheck to set the color variables/border
        gradientCheck(defaultBorderColor, elementID);
        
        // title styling
        document.documentElement.style.setProperty("--titleStyle", Config.titleStyle);
        document.documentElement.style.setProperty("--titleWeight", Config.titleWeight);
        document.documentElement.style.setProperty("--titleColor", defaultTitleColor);
        // album, artist, timer styling
        document.documentElement.style.setProperty("--supportStyles", Config.supportStyles);
        document.documentElement.style.setProperty("--supportWeights", Config.supportWeights);
        document.documentElement.style.setProperty("--supportColors", defaultSupportColors);
        // progress bar style
        document.documentElement.style.setProperty("--pbcNorm", defaultProgressColor);
        document.documentElement.style.setProperty("--pbcPause", Config.progressBarPaused);

        // gets the timeout duration to hide player
        playerTimeout = (Config.playerTimeout * 1000);

        // sets a constant for the max size the info fields can be (removes the padding and image size from player size)
        // since there's a 12px gap (same as padding), this only removes 1 padding, the gap basically acts as the other one
        maxInfoSize = (420 - (90 * 0.9) - 12);

        // defines the max size for the info fields (text, progress container (bar + timer))
        document.documentElement.style.setProperty("--maxInfoWidth", maxInfoSize + "px");

        // saves the http port as a constant
        const wsPort = Config.httpPort;
        // creates a websocket to that port
        ws = new WebSocket(`ws://127.0.0.1:${wsPort}/ws`);
        
        // debug/console printing (in browser)
        ws.onopen = () => {
            console.log("Websocket connected!");
        };
        // in case of an error with the websocket
        ws.onerror = (err) => {
            console.error("Websocket error: ", err);
        };
        // when the connection ends/disconnects
        ws.onclose = (evt) => {
            // send a warning in console
            console.warn("Websocket closed: ", evt);
            // wait 5 seconds (5000 ms), then retry
            setTimeout(() => {
                console.log("Attempting reconnect");
                ws = new WebSocket(`ws://127.0.0.1:${wsPort}/ws`);
                }, 10000);
        };
        // when it gets a new "message" (payload) from python
        ws.onmessage = (event) => {

            // opens and stores the data
            const data = JSON.parse(event.data);

            // debug, shows the payload information in the browser console
            console.log("Payload type:", data.type, "data:", data) 

            // "data.type" (given by SBO-WS in payload) determines what updates are performed:
            // "full" does both updates below, "track" runs player-related changes and timestamps, "color" only colors;
            // "progress" only happens if SBO spots the real progress and expected progress doesn't match (within a set threshold)
            // "keyframes" includes nothing, but tells the JS to load the new keyframes from keyframes.txt
            // this allows the Twitch chat commands to not re-run the entire program just to change colors

            // if the set data type is "track" or "full" (meaning song has changed)
            if (data.type === "track" || data.type === "full") {

                // assigns the boolean from the payload
                isPaused = data.paused
                // adds/removes the paused element style, based on the payload boolean for pause state
                if(isPaused) {
                    player.classList.add("paused");
                    // if the player interval isn't running yet (is null)
                    if (playerIntervalID === null) {
                        // starts a checker every 1 second to see if player should be hidden
                        playerIntervalID = setInterval(playerHider, 1000);
                    }
                }
                // if the playback isn't paused
                else {
                    // removes the pause element style from the classList
                    player.classList.remove("paused");
                }

                // sets the timer variables (with fallbacks)
                currentProgress = data.progress || 0;
                duration = data.duration || 1;
                // updates the last update time
                lastUpdateTime = Date.now();

                // checks if the last "track ID" doesn't match the current one (new song)
                if(lastTrackID !== data.id) {
                    // sets the temp variable to match
                    lastTrackID = data.id;

                    // list of elements to fade out and in
                    const fadeElements = [title, artist, album, cover, timer]

                    // goes through each element in the list
                    fadeElements.forEach(element => {
                        // sets the transition time for opacity 
                        element.style.transition = "opacity 1s";
                        // sets it to fade to 0.4 (40% opacity)
                        element.style.opacity = 0.4;
                    });

                    // waits a set amount (fairly smooth transition is with ~half of the opacity time - too fast and it snaps in, too slow and it looks laggy)
                    setTimeout(() => {

                        // grabs the text contents from the data file and turns into elements (uses "" if not found)
                        titleElement.textContent = data.title || "";
                        artistElement.textContent = data.artist || "";
                        albumElement.textContent = data.album || "";
                        // grabs the image, link -> picture
                        cover.src = data.cover;

                        // calls the length-checking function to get the size of the title field
                        checkTextSize(titleElement);
                        // calls the length-checking function to get the size of the artist field
                        checkTextSize(artistElement);
                        // calls the length-checking function to get the size of the album field
                        checkTextSize(albumElement);

                        // sets the opacities back to 1
                        fadeElements.forEach(element => {
                            // sets the transition time back to full opacity
                            element.style.transition = "opacity 1s"
                            element.style.opacity = 1;
                        });
                        // the time to wait (in ms)
                    }, 400)
                }
                // separately checks if the title is different in the data than it is here (in case of "paused on: ")
                if (titleElement.textContent !== data.title) {
                    // sets the title to match, with a small fade
                        title.style.transition = "opacity 0.5s"
                        title.style.opacity = 0;
                    setTimeout(() => {
                        titleElement.textContent = data.title || "";
                        checkTextSize(titleElement)
                        title.style.transition = "opacity 0.5s"
                        title.style.opacity = 1;
                    }, 250)
                }
            }
            // if the data type is "color" (meaning a chat command -> color change) or "full"
            if (data.type === "color" || data.type === "full") {
                // stores the spinner element string
                const elementID = "spinner";
                // if there's a borderColor (config)
                if (data.borderColor) {
                    // calls gradientCheck, passing the borderColor from data and the element ID to be passed
                    gradientCheck(data.borderColor, elementID);
                }
                else if (data.colors) {
                    // sends the colors from data instead
                    gradientCheck(data.colors, elementID)
                }
                // calls the function to change the colors
                colorChanger(data);
            }
            // if the data type is "progress" (meaning SBO flagged a discrepency in the song progress, but nothing else changed)
            if (data.type === "progress") {
                // updates the progress variable to match real-ish time
                currentProgress = data.progress;
            }

            // if the player isn't paused, regardless of payload type
            if (!isPaused) {
                // sets the player hider variables to null
                playerIntervalID = null;
                // sets the start time to null so it can restart
                startTime = null;
                // sets a transition and opacity
                player.style.transition = "opacity 1s";
                player.style.opacity = 1;
                background.style.transition = "opacity 1s";
                background.style.opacity = 1;
                fakeBorder.style.transition = "opacity 1s";
                fakeBorder.style.opacity = 1;
                // sets the flag back to false so it can rerun if necessary
                isHidden = false;
            }
        }; // closes the payload check
    });
});

</script>

    <defs>
        <!-- the mask's ID -->
        <mask id="playerCutout">
            <!-- the white rectangle is the area that will be visible (should match the fake border's size)
                x,y are position, rx,ry are corner rounding numbers / the white's x and y should be 0, so it's aligned with the fakeBorder
                black's x and 5 should match the border thickness you're aiming for (5px borders = 5,5) -->
            <rect x="0" y="0" width="454px" height="124px" rx="18" ry="18" fill="white"/>
            <!-- the black rectangle is the player's area, which will be cut out from the fake border box to make it transparent (so player can be seen)
                as such, the sizes should match player *including* its padding (currently 12px, so 420 + 12 + 12 = 444px) for both width and height -->
            <rect x="5" y="5" width="444px" height="114px" rx="15" ry="15" fill="black"/>
        </mask>
    </defs>
</svg>

    /* if this isn't set, uses block by default, which prevents text element scaling
        that means the text fields just use the max width they have, and *always* scroll */

        currently has small, 1.5px black borders, so this is -3px total */
    width: 451px;
    /* height is the same thing, (player + 2*padding + 2*border thickness) 
        same as width, -3px for borders */
    height: 121px;
    /* how rounded the outer corners should be (should match rx,ry in the white box in SVG definition */
    border-radius: 18px;
    /* a z-index of 4 guarantees it stays on top of everything, should be > player's index to hide the player corners  */
    z-index: 4;
    /* applies the "mask" (the SVG) so that the center is completely removed, and the player can be seen through */
    mask: url(#playerCutout);
    /* webkit mask is just in case the browser/OBS is having trouble with the default mask type */
    -webkit-mask: url(#playerCutout);
    /* adds small borders around the whole player to give pop-effect in contrasty situations */
    border: black 1.5px solid;
    /* important to hide the extra parts of "spinner", otherwise there'll be a massive color box spinning behind the player */

}

/* the "spinning" element (it's actually just a big box behind the border) */
.spinner {
    /* the width and height should be bigger than the biggest measurement of the border */
    width: 500px;
    height: 500px;
    /* ensures it gets positioned according to the coordinates, not where the document thinks it should sit*/
    position: absolute;
    /* the top coordinate is (half of fakeBorder's height - half of spinner's size:
        = (124 / 2) - 250 = 62px - 250 = -188 */
    top: -188px; bottom: 0px; 
    /* the left coordinate is (half of fakeBorder's width - half of spinner's size: 
        = (454 / 2) - 250 = 227 - 250 = -23 */
    left: -23px; right: 0px;

}

<script>

// check if any fields exceed the player size (whether they should scroll)
function checkTextSize(element) {

    // gets the passed element's scroll width (how wide the element is)
    const elementWidth = element.scrollWidth;
    // gets the passed element's parent element's width (should be #info for title, artist and album)
    const parentWidth = maxInfoSize;

    // stores the difference between the element and the player widths (integer)
    // if this is > 0, that means the text field is wider than the info field
    const elementDelta = (elementWidth - maxInfoSize);

    // stores the % the element should move (delta/width = ratio * 100 = %, and since it should move L -> R, it's negative)
    const shiftAmount = ((elementDelta / elementWidth) * (-100));

    // checks the width of the passed element against the "parent element" (the element that stores the passed element)
    // for all the elements currently contained, it's the 
    if (elementWidth > parentWidth) {

        // if the element is wider, but scrolling isn't applied
        if (!element.classList.contains("scrolling")) {
            // enables scrolling
            element.classList.add("scrolling");
        }
        // if the selected element is the title, sets its shift percentage
        if (element === titleElement) {
        document.documentElement.style.setProperty("--titleShift", shiftAmount + "%");
        }
        // if the selected element is the artist, sets its shift percentage
        if (element === artistElement) {
        document.documentElement.style.setProperty("--artistShift", shiftAmount + "%");
        }
        // if the selected element is the album, sets its shift percentage
        if (element === albumElement) {
        document.documentElement.style.setProperty("--albumShift", shiftAmount + "%");
        }
    } 
    // if the element selected is NOT wider than the "parent" - sets the titleShift to 0% (won't move)
    else {
        // if it's not wider, and scrolling is applied
        if (element.classList.contains("scrolling")) {
            // removes scrolling
            element.classList.remove("scrolling");
        }
        // if the selected element is the title, sets its shift percentage
        if (element === titleElement) {
        document.documentElement.style.setProperty("--titleShift", 0 + "%");
        }
        // if the selected element is the artist, sets its shift percentage
        if (element === artistElement) {
        document.documentElement.style.setProperty("--artistShift", 0 + "%");
        }
        // if the selected element is the album, sets its shift percentage
        if (element === albumElement) {
        document.documentElement.style.setProperty("--albumShift", 0 + "%");
        }
    }
} // checkTextSize close

// seconds to timers
function timeFormat(sec) {
    // calculates the minutes by dividing seconds by 60
    const min = Math.floor(sec / 60);
    // calculates seconds by doing divmod of seconds/60, then turning into a string and ensuring there's always 2 numbers (02, 13, etc)
    const secs = Math.floor(sec % 60).toString().padStart(2, "0");
    // returns the minutes and seconds, formatted, to the calling function
    return `${min}:${secs}`;
}

// progress bar animation
function progressAnimation() {

    // stores the current time in milliseconds
    const now = (Date.now());
    // calculates how long it's been since last update, turns into seconds
    const elapsed = (now - lastUpdateTime) / 1000;

    // sets the last update time to match the current time
    lastUpdateTime = now;

    // makes sure the player isn't paused - skips all calculation if the playback is paused (doesn't update the timer, so it stays still)
    if (!isPaused) {
        
        // adds the elapsed time to progress
        currentProgress += elapsed;

        // checks if the song's timer has run out, enforces a cap to the timer
        if (currentProgress > duration) {
            // sets the progress to match the length of the song, so that it doesn't go over
            // this is due to some (potential) delay between the Spotify -> HTML connection
            currentProgress = duration;
        }
    }
    // stores the percentage the song is at
    lastPercentage = (currentProgress / duration) * 100;

    // calculates and sets the progress bar percentage based off the percentage
    bar.style.width = Math.min(100, lastPercentage) + "%";

    // timer update (calls timeFormat on both the current time and the duration)
    // also controls the format, change the slash to change the style
    timer.textContent = `${timeFormat(currentProgress)} / ${timeFormat(duration)}`;

    // calls the animation request again on itself
    requestAnimationFrame(progressAnimation);
}

// function to change the color variables based on chat commands (chat -> Bot py -> SBO py -> SBO-WS py -> here)
function colorChanger(data) {
    // sets the property for title text color variable (based on what the data package contains - needs to be set, can't be "Clear", otherwise sets to default)
    document.documentElement.style.setProperty(
        "--titleColor",
        data.titleColor && data.titleColor !== "Clear" ? data.titleColor : defaultTitleColor
    );
    // sets the property for support text color variable (based on what the data package contains - needs to be set, can't be "Clear", otherwise sets to default)
    document.documentElement.style.setProperty(
        "--supportColors",
        data.supportColor && data.supportColor !== "Clear" ? data.supportColor : defaultSupportColors
    );
    // sets the property for progress bar color variable (based on what the data package contains - needs to be set, can't be "Clear", otherwise sets to default)
    document.documentElement.style.setProperty(
        "--pbcNorm",
        data.progressColor && data.progressColor !== "Clear" ? data.progressColor : defaultProgressColor
    );
}

// function to check if the player should be hidden 
function playerHider() {
    // if the player timeout config is set to 0 (means disabled)
    if (playerTimeout === 0) {
        // returns (stops running the function)
        return;
    }
    // checks if the start time has been changed since definition
    if (startTime === null) {
        // if not, stores current time (in ms)
        startTime = Date.now();
    }
    // gets the current time every loop
    const currentTime = Date.now();

    // if the time between pause start and now is > the set timeout time
    if ((currentTime - startTime) > playerTimeout) {
        // sets a transition and opacity 
        player.style.transition = "opacity 2s";
        player.style.opacity = 0;
        background.style.transition = "opacity 2s";
        background.style.opacity = 0;
        fakeBorder.style.transition = "opacity 2s";
        fakeBorder.style.opacity = 0;
        // sets the flag to true so it can be detected when playback continues
        isHidden = true;
        // stops the loop (clears the 1s checking)
        clearInterval(playerIntervalID);
    }
}

// function to check if gradient effect should be applied (checks if more than 1 color is passed, creates a dynamic color gradient)
function gradientCheck(colorList, elementName) {

    // if the color "list" is actually a string (when it's 1 color or when read via config)
    if (typeof colorList === "string") {
        // checks if there's a comma (multiple colors)
        if (colorList.includes(",")) {
            // splits and trims the string of colors
            KFcolors = colorList.split(',').map(color => color.trim());
        }
        // if there's no comma (single color)
        else {
            // directly trims the "list" and just uses the one single color as the list
            KFcolors = colorList.trim() === "" ? [] : [colorList.trim()];
            // if the "color" is "Clear" (command to set back to default)
            if (KFcolors[0] === "Clear") {
                // sets the color string to default so it resets the color
                KFcolors = "default";
            }
        }
    }
    // if the color list is undefined (no colors given in borderColor)
    else if (typeof colorList === "undefined" || colorList === null) {
        // if the colors aren't defined yet or it's set to default
        if (KFcolors === "default" || KFcolors === null) {
            // keeps/sets to default
            KFcolors = "default";
        }
        // if the colors are defined 
        else {
            // keeps the defined colors
            KFcolors = KFcolors;
        }
    }
    // if the color list is anything else (array, object)
    else {
        // if the content is empty (happens sometimes)
        if (colorList === null) {
            // keeps the already globally stored variable's content
            KFcolors = KFcolors;
        }
        else {
            // sets the "colors" variable by checking if the list is a true list (array) and applying color splitting/trimming
            KFcolors = Array.isArray(colorList) ? colorList : colorList.split(',').map(color => color.trim());
        }
    }

    // stores the first color as "firstColor" (very creative)
    const firstColor = KFcolors[0]

    // checks that the color container isn't a string (so when it's not "default")
    if (typeof KFcolors !== "string") {
        // if there's more than 1 color in the color variable 
        if (KFcolors.length > 1) {
            // adds the first color into the list (now has 2x the first color), to smooth the transition between start and end
            KFcolors.push(firstColor)
        }
    }

    // gets the passed element and stores as local constant (kind of useless for now, further element support OTW :) 
    const passedElement = document.getElementById(elementName)

    // sets some variables to none first so they can be set below
    passedElement.style.backgroundImage = "none";
    passedElement.style.backgroundColor = "none";

    // checks how many colors were given
    if (KFcolors === "default") {
        // user inform
        console.log("Found no colors, setting border to fallback color");
        // sets a stand-in duration (OBS wants this)
        passedElement.style.animationDuration = "60s";
        // applies the animation-less animation name/keyframes
        passedElement.style.animationName = "gradientSpinnerStop";
        // sets the color to fallback
        passedElement.style.backgroundColor = "#ffffff";
    }
    // if only one color was given (config default, config goes straight here)
    else if (KFcolors.length === 1) {
        // user inform
        console.log("Found 1 color - setting border to color");
        // sets a stand-in duration (OBS wants this)
        passedElement.style.animationDuration = "60s";
        // applies the animation-less animation name/keyframes
        passedElement.style.animationName = "gradientSpinnerStop";
        // sets the colors variable to match the only color
        passedElement.style.backgroundColor = `${firstColor}`;
    }
    // if two or more colors were given
    else {
        // user inform
        console.log("Found", KFcolors.length , "colors - setting border to gradient with given colors");
        // sets the time variable dynamically (10s / color)
        passedElement.style.animationDuration = (`${KFcolors.length * 10}` + "s");
        // sets the animation name
        passedElement.style.animationName = "gradientSpinnerSpin";
        // sets the colors variable to match
        passedElement.style.backgroundImage = `conic-gradient(${KFcolors.join(", ")})`;
    }
}

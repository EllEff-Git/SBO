<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Overlay v0.4.1.0824</title>

<script>


// initialises last track, player timeout start and playerIntervalID as null on start (+ a reconnect check)
let lastTrackID = null, startTime = null, playerIntervalID = null, reconnectFail = null;

// timer/progress bar variables
let currentProgress = 0, lastPercentage = 0;
let duration = 1, tempProgress = 1;
let lastUpdateTime = Date.now();

// initialises player visual variables
let maxInfoSize = 0, playerTimeout = 0, outerX = 0, outerY = 0;

// initialises a boolean for pause state stuff
let isPaused = false, wasPaused = false;

// initialises global variables (websocket + all the elements)
let ws, player, cover, fakeBorder, background, titleElement, artistElement, albumElement, bar, timer, backgroundCover;

// initialises global color variables
let defaultTitleColor, defaultSupportColors, defaultBorderColor, defaultProgressColor, defaultPauseColor;

// initialises global color variable lengths
let dTClength, dSClength, dBClength, dPClength;

// initialises widths for player 
let playerWidthRaw = 0, playerHeightRaw = 0;

// defines the keyframes and color array (empty, will be filled on load)
let KF, KFcolors;

// waits for the HTML to be fully loaded, then loads the rest
document.addEventListener("DOMContentLoaded", () => {
    // updates global constants to match elements 
    player = document.getElementById("player");
    cover = document.getElementById("cover");
    fakeBorder = document.getElementById("fakeBorder");
    background = document.getElementById("background");
    backgroundCover = document.getElementById("backgroundCover");
    titleElement = document.getElementById("title");
    artistElement = document.getElementById("artist");
    albumElement = document.getElementById("album");
    bar = document.getElementById("bar");
    timer = document.getElementById("timer");

    // calls the animation function to start the progress bar
    progressAnimation();

    // grabs the config.json file (sent by SBO-WS.exe during startup)
    // you can see this if you go to localhost:(httpPort)/config.json (httpPort being the config port)
    fetch("/config.json", {cache: "no-store"})

        // loads the config options as Config
        .then(res => {
            // if the file isn't loaded properly
            if (!res.ok) {
                // sends error to log
                throw new Error("Failed to get config.json");
            }
            // otherwise, returns the json file
            return res.json();
        })
        // reads the config
        .then(Config => {

        // sets all the variables that the elements use based on loaded config.json file
        
        // stores the config colors in these "default variables" (as strings)
        defaultTitleColor = Config.titleColor;
        defaultSupportColors = Config.supportColors;
        defaultProgressColor = Config.progressBarColor;
        defaultBorderColor = Config.borderColor;
        defaultPauseColor = Config.progressBarPaused;

        // splits the color variables and stores their lengths (used later for checks when clearing colors)
        if (defaultTitleColor.includes(",")) {
            // splits the color string
            const dTCtemp = defaultTitleColor.split(",");
            // stores the first color
            const firstColor = dTCtemp[0];
            // stores the title color with the first color added to the end (helps smooth transitions)
            defaultTitleColor = `${defaultTitleColor}, ${firstColor}`;
            // stores the length in the global variable
            dTClength = dTCtemp.length + 1;
        }
        // no comma = single color
        else {
            dTClength = 1
        }

        // splits the color variables and stores their lengths (used later for checks when clearing colors)
        if (defaultSupportColors.includes(",")) {
            // splits the color string
            const dSCtemp = defaultSupportColors.split(",");
            // stores the first color
            const firstColor = dSCtemp[0];
            // stores the title color with the first color added to the end (helps smooth transitions)
            defaultSupportColors = `${defaultSupportColors}, ${firstColor}`;
            // stores the length in the global variable
            dSClength = dSCtemp.length + 1;
        }
        // no comma = single color
        else {
            dSClength = 1
        }

        // splits the color variables and stores their lengths (used later for checks when clearing colors)
        if (defaultProgressColor.includes(",")) {
            // splits the color string
            const dPCtemp = defaultProgressColor.split(",");
            // stores the first color
            const firstColor = dPCtemp[0];
            // stores the title color with the first color added to the end (helps smooth transitions)
            defaultProgressColor = `${defaultProgressColor}, ${firstColor}`;
            // stores the length in the global variable
            dPClength = dPCtemp.length + 1;
        }
        // no comma = single color
        else {
            dPClength = 1
        }

        // splits the color variables and stores their lengths (used later for checks when clearing colors)
        if (defaultBorderColor.includes(",")) {
            // splits the color string
            const dBCtemp = defaultBorderColor.split(",");
            // stores the first color
            const firstColor = dBCtemp[0];
            // stores the title color with the first color added to the end (helps smooth transitions)
            defaultBorderColor = `${defaultBorderColor}, ${firstColor}`;
            // stores the length in the global variable
            dBClength = dBCtemp.length + 1;
        }
        // no comma = single color
        else {
            dBClength = 1
        }

        // calls the gradientCheck to set the color variables/border
        gradientCheck(defaultTitleColor, "title");
        gradientCheck(defaultSupportColors, "artist");
        gradientCheck(defaultSupportColors, "album");
        gradientCheck(defaultProgressColor, "bar");
        gradientCheck(defaultBorderColor, "spinner");
    
        // gets the timeout duration to hide player
        playerTimeout = (Config.playerTimeout * 1000);

        // sets a constant for the max size the info fields can be (removes the padding and image size from player size)
        // since there's a 12px gap (same as padding), this only removes 1 padding, the gap basically acts as the other one
        maxInfoSize = (420 - (90 * 0.9) - 12);

        // defines the max size for the info fields (text, progress container (bar + timer))
        document.documentElement.style.setProperty("--maxInfoWidth", maxInfoSize + "px");

        // saves the http port as a constant (config-set)
        const wsPort = Config.httpPort;
        // stores the connection type (protocol) as a constant
        const protocol = window.location.protocol === "https" ? "wss" : "ws";
        // stores the host as a constant (0.0.0.0, localhost, local IP (192.168...))
        const host = window.location.hostname;

        // creates a websocket at address with set port
        ws = new WebSocket(`${protocol}://${host}:${wsPort}/ws`);
        
        // debug/console printing (in browser)
        ws.onopen = () => {
            // logs connection to console
            console.log("Websocket connected!");
            // sets the reconnect status to null
            reconnectFail = null;
        };
        // in case of an error with the websocket
        ws.onerror = (err) => {
            // logs error to console
            console.error("Websocket error: ", err);
        };
        // when the connection ends/disconnects
        ws.onclose = (evt) => {
            // checks if there's already been a reconnect attempt
            if (reconnectFail === null) {
                // send a warning in console
                console.warn("Websocket closed: ", evt);
                // informs of a refresh (reload)
                console.log("Reconnecting in 10s...");
                // wait 10 seconds (1000 ms), then tries to reconnect
                setTimeout(() => {
                    // logs to console that it's about to refresh
                    console.log("Reconnecting...");
                    // sets the reconnectFail to not null (so it doesn't refresh infinitely)
                    reconnectFail = "notNull";
                    // reloads the page
                    window.location.reload();
                    }, 10000);
            }
            // if there already has been a reconnect attempt
            else {
                // logs to console the failure
                console.log("Reconnect failed! Ensure SBO-WS is running and refresh manually!");
            }
        };
        // when it gets a new "message" (payload) from python
        ws.onmessage = (event) => {

            // opens and stores the data
            const data = JSON.parse(event.data);

            // debug, shows the payload information in the browser console
            console.log("Payload type:", data.type, "data:", data) 

            // "data.type" (given by SBO-WS in payload) determines what updates are performed:
            // "full" does both updates below, "track" runs player-related changes and timestamps, "color" only colors;
            // "progress" only happens if SBO spots the real progress and expected progress doesn't match (within a set threshold)
            // this allows the Twitch chat commands to not re-run the entire program just to change colors

            // if the set data type is "track" or "full" (meaning song or state has changed)
            if (data.type === "track" || data.type === "full") {

                // assigns the boolean from the payload
                isPaused = data.paused
                // adds/removes the paused element style, based on the payload boolean for pause state
                if (isPaused) {
                    // if the player interval isn't running yet (is null)
                    if (playerIntervalID === null) {
                        // starts a checker every 1 second to see if player should be hidden
                        playerIntervalID = setInterval(playerHider, 1000);
                    }
                }

                // sets the timer variables (with fallbacks)
                currentProgress = data.progress || 0;
                duration = data.duration || 1;
                // updates the last update time
                lastUpdateTime = Date.now();

                // checks if the last "track ID" doesn't match the current one (new song)
                if(lastTrackID !== data.id) {
                    // sets the temp variable to match
                    lastTrackID = data.id;

                    // list of elements to fade out and in
                    const fadeElements = [title, artist, album, cover, timer]

                    // goes through each element in the list
                    fadeElements.forEach(element => {
                        // sets the transition time for opacity 
                        element.style.transition = "opacity 1s";
                        // sets it to fade to 0.4 (40% opacity)
                        element.style.opacity = 0.4;
                    });

                    // waits a set amount (fairly smooth transition is with ~half of the opacity time - too fast and it snaps in, too slow and it looks laggy)
                    setTimeout(() => {

                        // grabs the text contents from the data file and turns into elements (uses "" if not found)
                        artistElement.textContent = data.artist || "";
                        albumElement.textContent = data.album || "";

                        // grabs the album image link, turns into cover picture
                        cover.src = data.cover;

                        // the background image - swap a commented-out line with the active one to disable/set custom image
                        backgroundCover.src = data.cover; // by default, uses the same album cover as the background
                        //backgroundCover.src = "none"; // "none" makes sure there's no image loaded (otherwise will have a symbol in the corner)
                        //backgroundCover.src = "https://i.imgur.com/veryRealPicture.PNG"; // any direct link works (that's how the Spotify links work, too)

                        // calls the length-checking function to get the size of the title field
                        checkTextSize(titleElement);
                        // calls the length-checking function to get the size of the artist field
                        checkTextSize(artistElement);
                        // calls the length-checking function to get the size of the album field
                        checkTextSize(albumElement);

                        // sets the opacities back to 1
                        fadeElements.forEach(element => {
                            // sets the transition time back to full opacity
                            element.style.transition = "opacity 1s"
                            element.style.opacity = 1;
                        });
                        // the time to wait (in ms)
                    }, 400)
                }
                // separately checks if the title is different in the data than it is here (in case of "paused on: ")
                if (titleElement.textContent !== data.title) {
                    // sets the title to match, with a small fade
                        title.style.transition = "opacity 0.5s"
                        title.style.opacity = 0;
                    setTimeout(() => {
                        titleElement.textContent = data.title || "";
                        checkTextSize(titleElement)
                        title.style.transition = "opacity 0.5s"
                        title.style.opacity = 1;
                    }, 250)
                }
            }
            // if the data type is "color" (meaning a chat command -> color change) or "full"
            if (data.type === "color" || data.type === "full") {
                // if there's a borderColor (overlay border)
                if (data.borderColor) {
                    // calls gradientCheck, passing the borderColor from data and the element name
                    gradientCheck(data.borderColor, "spinner");
                }
                // if there's a progressColor (progress bar)
                else if (data.progressColor) {
                    gradientCheck(data.progressColor, "bar");
                }
                // if there's a supportColor (artist/album text)
                else if (data.supportColor) {
                    gradientCheck(data.supportColor, "artist");
                    gradientCheck(data.supportColor, "album");
                }
                // if there's a titleColor (song text)
                else if (data.titleColor) {
                    gradientCheck(data.titleColor, "title");
                }
            }
            // if the data type is "progress" (meaning SBO flagged a discrepency in the song progress, but nothing else changed)
            if (data.type === "progress") {
                // updates the progress variable to match real-ish time
                currentProgress = data.progress;
            }
            // if the data type is "track", meaning the track had an update (paused)
            if (data.type === "track") {
                // if there's a pause (meaning paused bar visual should be applied)
                if (data.paused && !wasPaused) {
                    // runs gradientCheck on the progress bar
                    gradientCheck(defaultPauseColor, "bar")
                    // sets the "wasPaused" to true, so the bar can change back
                    wasPaused = true;
                }
                // if the track isn't paused
                else {
                    // runs gradientCheck on the progress bar
                    gradientCheck(defaultProgressColor, "bar")
                    // sets the "wasPaused" to false, so the bar doesn't get reset again
                    wasPaused = false;
                }
            }


            // if the player isn't paused, regardless of payload type
            if (!isPaused) {
                // sets the player hider variables to null
                clearInterval(playerIntervalID);
                playerIntervalID = null;
                // sets the start time to null so it can restart
                startTime = null;
                // sets a transition and opacity
                player.style.transition = "opacity 1s";
                player.style.opacity = 1;
                background.style.transition = "opacity 1s";
                background.style.opacity = 1;
                fakeBorder.style.transition = "opacity 1s";
                fakeBorder.style.opacity = 1;
            }
        }; // closes the payload check
    });
});

</script>

<body>

<!-- fake border is the element that gets the player size cut out, sits on top of everything
        basically just a rectangle that gets its center diced off to allow transparency -->
<div class="fakeBorder" id="fakeBorder">
    <!-- spinner is the color-matched box that spins behind fakeBorder, to allow the colors to pass through -->
    <div class="spinner" id="spinner"></div>
</div>
<!-- the player element, contains all fields/elements -->
<div id="player">
    <!-- the background element, sits below player to add a background (image, color, opaque...) -->
    <div id="background"></div>
    <!-- the background's image (if enabled)-->
    <img id="backgroundCover" src=""></img>
    <!-- the image/album cover -->
    <img id="cover" src="">
    <!-- the field container (text fields, progress bar, timer)-->
    <div id="info">
        <!-- the text wrapper for the title field -->
        <div class="text-wrapper">
            <div class="title" id="title"></div>
        </div>
        <!-- the text wrapper for the artist field -->
        <div class="text-wrapper">
            <div class="artist" id="artist"></div>
        </div>
        <!-- the text wrapper for the album field-->
        <div class="text-wrapper">
           <div class="album" id="album"></div>
        </div>
        <!-- the progress container, houses the progress bar and timer-->
        <div id="progress-container">
            <!-- the progress bar 
                "progress" is the container, houses the background color (#949494 default ~greyish)
                "bar" is the actual bar, which colors get applied to and moves based on percentage -->
            <div id="progress"><div id="bar"></div></div>
            <!-- the progress timer, sets default value -->
            <div id="timer">0:00 / 0:00</div>
        </div>
    </div>
</div>

<!-- svg element used to "cut out" the fake border element so it looks like a border but acts as a box (better for animations)
    these measurements should be identical to the white box below, they're just the fakeBorder's measurements -->
<svg width="454px" height="124px">
    <defs>
        <!-- the mask's ID -->
        <mask id="playerCutout">
            <!-- the white rectangle is the area that will be visible (should match the fake border's size)
                x,y are position, rx,ry are corner rounding numbers / the white's x and y should be 0, so it's aligned with the fakeBorder
                black's x and 5 should match the border thickness you're aiming for (5px borders = 5,5) -->
            <rect x="0" y="0" width="454px" height="124px" rx="18" ry="18" fill="white"></rect>
            <!-- the black rectangle is the player's area, which will be cut out from the fake border box to make it transparent (so player can be seen)
                as such, the sizes should match player *including* its padding (currently 12px, so 420 + 12 + 12 = 444px) for both width and height -->
            <rect x="5" y="5" width="444px" height="114px" rx="15" ry="15" fill="black"></rect>
        </mask>
    </defs>
</svg>

</body>
<style>

/* some mega-override element that breaks everything */
div {
    /* if this isn't set, uses block by default, which prevents text element scaling
        that means the text fields just use the max width they have, and *always* scroll */
    display: flex;
}

/* base page body */
body {
    /* background must be transparent for capture to function, otherwise will capture that color under the player */
    background: transparent;
    /* can be used to change the font for all texts, or the font can be defined per-field below */
    font-family: "Segoe UI", sans-serif;
}

/* a background element behind the player, added to add more blur/opaqueness */
#background {
    /* position should be absolute, to ensure it doesn't get squished by other elements in player */
    position: absolute;
    /* 0 in everything ensures it follows the player settings */
    top: 0; bottom: 0; left: 0px; right: 0;
    /* color and opacity of the background 
        this controls how the background looks, if you want a pink hue, make it pink, blue -> blue, etc 
        the last number is opacity, 0-1, 0 being fully transparent, 1 being fully opaque */
    background-color: rgba(1, 1, 1, 0.75);
    /* how rounded the player element's corners should be (should be 1px less than fakeBorder, to prevent gaps) */
    border-radius: 14px;
    /* matches the player size + the padding */
    width: 448px;
    height: 118px;
    /* z-index of background should be the lowest out of all*/
    z-index: 1;
}

/* puts the album cover in the background */
#backgroundCover {
    /* sets the position*/
    position: absolute;
    top: 8; left: 0;
    /* matches the player size + the padding */
    width: 448px;
    height: 118px;
    /* makes sure the corners don't show up */
    border-radius: 15px;
    /* ensures there's no extra color*/
    background-color: none;
    /* how blurry the background should be (higher pixel # is more blurry) */
    filter: blur(5px);
    /* how the picture is formatted - cover sets it so it fits width-wise and the height is cut
        fill stretches it so both dimensions are filled 
        contain makes it fit height-wise (only appears in the middle) */
    object-fit: cover;
    /* how the picture is positioned - accepts things like "top right" or "bottom" */
    object-position: center;
    /* how see-through the picture is */
    opacity: 0.75;
}

/* the player, aka the full base for all elements */
#player {
    /* positioning of the player */
    position: absolute;
    /* how far from the top-left corner the player should be */
    top: 8px; bottom: 0px; left: 8px; right: 0px;
    display: flex;
    align-items: center;
    /* space between the picture and other elements */
    gap: 12px;
    /* first 3 are color, the last number in background dictates how opaque it is */
    background: rgba(25, 25, 25, 0.75);
    /* how rounded the player element's corners should be (should be 1px less than fakeBorder, to prevent gaps) */
    border-radius: 14px;
    /* how much space there is on the outside of the picture/text/timer elements */
    padding: 12px;
    /* player sizes */
    width: 424px;
    height: 94px;
    /* the depth of the player (must be higher than background, equal or lower than elements) */
    z-index: 2;
    overflow: hidden;
}

/* the "border" around the player - it's really just a box with an SVG cutout applied */
.fakeBorder {
    position: absolute;
    /* how far from the top-left corner the player should be */
    top: 5px; bottom: 0px; left: 5px; right: 0px;
    /* width should be how wide the player is (with paddings) + how much border area you want (5px per side default) 
        currently has small, 1.5px black borders, so this is -3px total */
    width: 451px;
    /* height is the same thing, (player + 2*padding + 2*border thickness) 
        same as width, -3px for borders */
    height: 121px;
    /* how rounded the outer corners should be (should match rx,ry in the white box in SVG definition */
    border-radius: 18px;
    /* a z-index of 4 guarantees it stays on top of everything, should be > player's index to hide the player corners  */
    z-index: 4;
    /* applies the "mask" (the SVG) so that the center is completely removed, and the player can be seen through */
    mask: url(#playerCutout);
    /* webkit mask is just in case the browser/OBS is having trouble with the default mask type */
    -webkit-mask: url(#playerCutout);
    /* adds small borders around the whole player to give pop-effect in contrasty situations */
    border: black 1.5px solid;
    /* important to hide the extra parts of "spinner", otherwise there'll be a massive color box spinning behind the player */
    overflow: hidden;
}

/* the "spinning" element (it's actually just a big box behind the border) */
.spinner {
    /* the width and height should be bigger than the biggest measurement of the border */
    width: 500px;
    height: 500px;
    /* ensures it gets positioned according to the coordinates, not where the document thinks it should sit*/
    position: absolute;
    /* the top coordinate is (half of fakeBorder's height - half of spinner's size:
        = (124 / 2) - 250 = 62px - 250 = -188 */
    top: -188px; bottom: 0px; 
    /* the left coordinate is (half of fakeBorder's width - half of spinner's size: 
        = (454 / 2) - 250 = 227 - 250 = -23 */
    left: -23px; right: 0px;
    /* these fields are automatically overwritten by the gradientCheck below, these are mostly just fallbacks/guides */
    /* sets the animation by name (always called gradientBorder, because that's what SBO-WS uses when building) */
    animation-name: gradientSpinnerSpin;
    /* how the animation should move between frames */
    animation-timing-function: linear;
    /* how long the total animation is (currently calculated based on # of colors at the very bottom of the document */
    animation-duration: 40s;
    /* how many times it should repeat the animation */
    animation-iteration-count: infinite;
    /* sets the "image" to a cone gradient (starts at middle, expands towards the edges) with the variable colors */
    background-image: conic-gradient(#ffffff, #424242);
}

/* the keyframes to use when the gradient is applied (>= 2 colors) */
@keyframes gradientSpinnerSpin {
    0% {
        /* sets the initial angle (0 degrees) */
        transform: rotate(0deg);
    }
    100% {
        /* sets the final angle (360 means it does 1 full loop per iteration) */
        transform: rotate(360deg);
    }
}

/* the keyframes to use when the gradient is not applied (0 or 1 colors) */
@keyframes gradientSpinnerStop {
    0% {
        /* sets the initial angle (0 degrees) */
        transform: rotate(0deg);
    }
    100% {
        /* sets the final angle (0 in both means it doesn't move) */
        transform: rotate(0deg);
    }
}

/* album picture */
#cover {
    /* how wide the picture should be */
    width: auto;
    max-width: 30%;
    /* how tall the picture should be */
    height: auto;
    max-height: 90%;
    /* how rounded the corners should be */
    border-radius: 10px;
    /* how to place the picture, contain ensures it fits into the smaller of the two size constraints (usually height) */
    object-fit: contain;
    /* the color of the cover background - only visible when no picture is found */
    background: #424242;
    /* doesn't allow it to shrink */
    flex-shrink: 0;
    /* z-index of 3 is higher than the player itself */
    z-index: 3;
    /* a border around the album cover, if desired */
    /* border: 1px solid white; */
}

/* main info, all player fields inherit this (text, bar, timer) */
#info {
    /* allows the fields to sit in the spots they need, vertically */
    display: flex;
    flex-direction: column;
    /* hides the parts of text that spill over */
    overflow: hidden;
    flex: 1;
    /* higher than player */
    z-index: 3;
    /* inherits size from player and cover */
    width: auto;
    max-width: none;
    height: auto;
}

/* the text fields inherit these */
.text-wrapper {
    /* sets a lot of positional info to ensure text fields behave */
    display: flex;
    justify-content: flex-start;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
}

/* all text field-wide configs */
.title, .artist, .album {
    position: relative;
    /* lets the text overflow, but clips the overflowed portion */
    text-overflow: clip;
    /* ensures they always have some space */
    min-width: 0;
    /* stops the fields from submitting to other size restrictions */
    flex-shrink: 0;
    /* the size of the text */
    font-size: 14px; 
    /* the text styling */
    font-weight: bold;
    font-style: italic;
    /* adds borders around the text - looks better in browser capture, comment out/set to 0px if it interferes 
        basically just helps the text not "shimmer" when it's scrolling */
    -webkit-text-stroke: 0.5px black;
    /* ensures the text itself is transparent, allowing the "background" from gradientCheck to be seen through */
    -webkit-text-fill-color: transparent;
    color: transparent;
    /* clips the text out of the background */
    background-clip: text;
}

/* the name/title field of the song */
.title {
    /* lets the title sit slightly above where the default is */
    top: -3px;
    /* the title's styling (matches the others now, can be changed) */
    font-weight: bold;
    font-style: italic;
    /* the size of the title text */
    font-size: 19px;
    /* makes the text scale to fit without restrictions */
    width: auto;
    max-width: none;
}

/* artist and album fields */
.artist .album {
    /* makes the text scale to fit without restrictions */
    width: auto;
    max-width: none;
    /* the support text's styling (matches the title now, can be changed) */
    font-weight: bold;
    font-style: italic;
}

/* the progress bar + timer container */
#progress-container {
    display: flex;
    /* aligns the bar and timer so they're equally spaced out from the edge and picture*/
    align-items: center;
    justify-content: space-between;
    /* the gap between the bar and timer*/
    gap: 6px;
    margin-top: 4px;
    /* can't be larger than the info field itself, uses calculated size */
    max-width: var(--maxInfoWidth, 80%);
}

/* progress bar (background / empty) */
#progress {
    flex: 1;
    /* sets minimum width */
    min-width: 50px;
    /* how tall the player progress bar should be */
    height: 4px;
    /* the color of the empty part of the bar */
    background: #949494;
    /* places the progress bar slightly more below the text fields than the timer */
    margin-top: 3px;
    /* how rounded the corners are */
    border-radius: 2px;
    /* border style around the progress bar (black gives a good contrast with this background setting */
    border: 1.5px, solid, #000000;
    overflow: hidden;
    position: relative;
}

/* progress bar (fill) */
#bar {
    height: 100%;
    /* sets a background image */
    background-color: #1ED760;
    width: 0%;
    /* adds a tiny transition to smoothe the bar updates */
    transition: width 0.4s linear;
    /* sets the position inside the progress bar */
    position: absolute;
    top: 0;
    left: 0;
}

/* the timer/duration on the right */
#timer {
    /* sets a font that's just a smidge smaller than album and artist */
    font-size: 11px;
    white-space: nowrap;
    opacity: 0.8;
    /* color and style are matched with the other support fields (album, artist) */
    color: #ffffff;
    font-style: italic;
    font-weight: bold;
}

/* each individual text field's scroll rules
    sets the animation rules for keyframes per field
    timer determines how fast/slow the movement should be, the lower the time, the faster the scroll
    linear infinite means it keeps doing it, and does so at a steady pace (no ease/acceleration at any point)
    alternate means once it hits the end, it turns back around and repeats the other way */
.title.scrolling {
    animation: scrollTitle 18s linear infinite alternate;
}

.artist.scrolling {
    animation: scrollArtist 20s linear infinite alternate;
}

.album.scrolling {
    animation: scrollAlbum 20s linear infinite alternate;
}

/* keyframes for title scrolling */
@keyframes scrollTitle {
    0% {
        /* starts at 0% (normal position) */
        transform: translateX(0%);
    }
    15% {
        /* stays there for 15% of the duration */
        /* stalls on the left so that the text stays in place for a bit */
        transform: translateX(0%);
    }
    85% {
        /* moves to a variable-defined location */
        transform: translateX(var(--titleShift));
    }
    100% {
        /* stays there for 15% of the duration */
        /* stalls on the right so the text is easy to read */
        transform: translateX(var(--titleShift));
    }
}

/* keyframes for artist scrolling */
@keyframes scrollArtist {
    0% {
        /* starts at 0% (normal position) */
        transform: translateX(0%);
    }
    15% {
        /* stays there for 15% of the duration */
        /* stalls on the left so that the text stays in place for a bit */
        transform: translateX(0%);
    }
    85% {
        /* moves to a variable-defined location */
        transform: translateX(var(--artistShift));
    }
    100% {
        /* stays there for 15% of the duration */
        /* stalls on the right so the text is easy to read */
        transform: translateX(var(--artistShift));
    }
}

/* keyframes for album scrolling */
@keyframes scrollAlbum {
    0% {
        /* starts at 0% (normal position) */
        transform: translateX(0%);
    }
    15% {
        /* stays there for 15% of the duration */
        /* stalls on the left so that the text stays in place for a bit */
        transform: translateX(0%);
    }
    85% {
        /* moves to a variable-defined location */
        transform: translateX(var(--albumShift));
    }
    100% {
        /* stays there for 15% of the duration */
        /* stalls on the right so the text is easy to read */
        transform: translateX(var(--albumShift));
    }
}

</style>

<script>

// check if any fields exceed the player size (whether they should scroll)
function checkTextSize(element) {

    // gets the passed element's scroll width (how wide the element is)
    const elementWidth = element.scrollWidth;
    // gets the passed element's parent element's width (should be #info for title, artist and album)
    const parentWidth = maxInfoSize;

    // stores the difference between the element and the player widths (integer)
    // if this is > 0, that means the text field is wider than the info field
    const elementDelta = (elementWidth - maxInfoSize);

    // stores the % the element should move (delta/width = ratio * 100 = %, and since it should move L -> R, it's negative)
    // if the text fields use italic font style, the multiplier should be slightly larger, to help offset for the slanted text
    const shiftAmount = ((elementDelta / elementWidth) * (-107));

    // checks the width of the passed element against the "parent element" (the element that stores the passed element)
    // for all the elements currently contained, it's the 
    if (elementWidth > parentWidth) {

        // if the element is wider, but scrolling isn't applied
        if (!element.classList.contains("scrolling")) {
            // enables scrolling
            element.classList.add("scrolling");
        }
        // if the selected element is the title, sets its shift percentage
        if (element === titleElement) {
        document.documentElement.style.setProperty("--titleShift", shiftAmount + "%");
        }
        // if the selected element is the artist, sets its shift percentage
        if (element === artistElement) {
        document.documentElement.style.setProperty("--artistShift", shiftAmount + "%");
        }
        // if the selected element is the album, sets its shift percentage
        if (element === albumElement) {
        document.documentElement.style.setProperty("--albumShift", shiftAmount + "%");
        }
    } 
    // if the element selected is NOT wider than the "parent" - sets the titleShift to 0% (won't move)
    else {
        // if it's not wider, and scrolling is applied
        if (element.classList.contains("scrolling")) {
            // removes scrolling
            element.classList.remove("scrolling");
        }
        // if the selected element is the title, sets its shift percentage
        if (element === titleElement) {
        document.documentElement.style.setProperty("--titleShift", 0 + "%");
        }
        // if the selected element is the artist, sets its shift percentage
        if (element === artistElement) {
        document.documentElement.style.setProperty("--artistShift", 0 + "%");
        }
        // if the selected element is the album, sets its shift percentage
        if (element === albumElement) {
        document.documentElement.style.setProperty("--albumShift", 0 + "%");
        }
    }
} // checkTextSize close

// seconds to timers
function timeFormat(sec) {
    // calculates the minutes by dividing seconds by 60
    const min = Math.floor(sec / 60);
    // calculates seconds by doing divmod of seconds/60, then turning into a string and ensuring there's always 2 numbers (02, 13, etc)
    const secs = Math.floor(sec % 60).toString().padStart(2, "0");
    // returns the minutes and seconds, formatted, to the calling function
    return `${min}:${secs}`;
}

// progress bar animation
function progressAnimation() {

    // stores the current time in milliseconds
    const now = (Date.now());
    // calculates how long it's been since last update, turns into seconds
    const elapsed = (now - lastUpdateTime) / 1000;

    // sets the last update time to match the current time
    lastUpdateTime = now;

    // makes sure the player isn't paused - skips all calculation if the playback is paused (doesn't update the timer, so it stays still)
    if (!isPaused) {
        
        // adds the elapsed time to progress
        currentProgress += elapsed;

        // checks if the song's timer has run out, enforces a cap to the timer
        if (currentProgress > duration) {
            // sets the progress to match the length of the song, so that it doesn't go over
            // this is due to some (potential) delay between the Spotify -> HTML connection
            currentProgress = duration;
        }
    }
    // stores the percentage the song is at
    lastPercentage = (currentProgress / duration) * 100;

    // calculates and sets the progress bar percentage based off the percentage
    bar.style.width = Math.min(100, lastPercentage) + "%";

    // timer update (calls timeFormat on both the current time and the duration)
    // also controls the format, change the slash to change the style
    timer.textContent = `${timeFormat(currentProgress)} / ${timeFormat(duration)}`;

    // calls the animation request again on itself
    requestAnimationFrame(progressAnimation);
}

// function to check if the player should be hidden 
function playerHider() {
    // if the player timeout config is set to 0 (means disabled)
    if (playerTimeout === 0) {
        // returns (stops running the function)
        return;
    }
    // checks if the start time has been changed since definition
    if (startTime === null) {
        // if not, stores current time (in ms)
        startTime = Date.now();
    }
    // gets the current time every loop
    const currentTime = Date.now();

    // if the time between pause start and now is > the set timeout time *and* the playerinterval is defined (means it hasn't been cancelled)
    if (((currentTime - startTime) > playerTimeout) && playerIntervalID !== null) {
        // sets a transition and opacity 
        player.style.transition = "opacity 2s";
        player.style.opacity = 0;
        background.style.transition = "opacity 2s";
        background.style.opacity = 0;
        fakeBorder.style.transition = "opacity 2s";
        fakeBorder.style.opacity = 0;
        // stops the loop (clears the 1x/1s interval for running the playerHider)
        clearInterval(playerIntervalID);
        // sets the interval to null
        playerIntervalID === null;
    }
    // if the playerinterval is set to null
    else if (playerIntervalID === null){
        // stops running the function
        return;
    }
}

// function to check if gradient effect should be applied (checks if more than 1 color is passed, creates a dynamic color gradient)
function gradientCheck(colorList, elementName) {

    // if the color "list" is actually a string (when it's 1 color or when read via config)
    if (typeof colorList === "string") {
        // checks if there's a comma (multiple colors)
        if (colorList.includes(",")) {
            // splits and trims the string of colors
            KFcolors = colorList.split(',').map(color => color.trim());
        }
        // if there's no comma (single color)
        else {
            // directly trims the "list" and just uses the one single color as the list
            KFcolors = colorList.trim() === "" ? [] : [colorList.trim()];
            // if the "color" is "Clear" or "clear" (command to set back to default)
            if (KFcolors[0] === "Clear" || KFcolors[0] === "clear") {
                // sets the color string to default so it resets the color
                KFcolors = "default";
            }
        }
    }
    // if the color list is undefined (no colors given in borderColor)
    else if (typeof colorList === "undefined" || colorList === null) {
        // if the colors aren't defined yet or it's set to default
        if (KFcolors === "default" || KFcolors === null) {
            // keeps/sets to default
            KFcolors = "default";
        }
        // if the colors are defined 
        else {
            // keeps the defined colors
            KFcolors = KFcolors;
        }
    }
    // if the color list is anything else (array, object)
    else {
        // if the content is empty (happens sometimes)
        if (colorList === null) {
            // keeps the already globally stored variable's content
            KFcolors = KFcolors;
        }
        else {
            // sets the "colors" variable by checking if the list is a true list (array) and applying color splitting/trimming
            KFcolors = Array.isArray(colorList) ? colorList : colorList.split(',').map(color => color.trim());
        }
    }

    // stores the first color as "firstColor" (very creative)
    const firstColor = KFcolors[0]

    // checks that the color container isn't a string (so when it's not "default")
    if (typeof KFcolors !== "string") {
        // if there's more than 1 color in the color variable 
        if (KFcolors.length > 1) {
            // adds the first color into the list (now has 2x the first color), to smooth the transition between start and end
            KFcolors.push(firstColor)
        }
    }

    // gets the passed element and stores as local constant
    const passedElement = document.getElementById(elementName)

    // if the parameter was "spinner" (border element)
    if (elementName === "spinner") {
        // sets some variables to none first so they can be set below
        passedElement.style.backgroundImage = "none";
        passedElement.style.backgroundColor = "none";

        // if the color has been called to reset (or none were passed)
        if (KFcolors === "default") {
            // user inform
            console.log("Found no colors, clearing border");
            // sets a stand-in duration (OBS wants this)
            passedElement.style.animationDuration = "60s";
            // applies the animation-less animation name/keyframes
            passedElement.style.animationName = "gradientSpinnerStop";
            // sets the color to fallback
            if (dBClength > 1) {
                passedElement.style.backgroundImage = `conic-gradient(${defaultBorderColor})`;
            }
            else {
                passedElement.style.backgroundColor = "#ffffff";
            }
        }
        // if only one color was given (config default, config goes straight here)
        else if (KFcolors.length === 1) {
            // user inform
            console.log("Found 1 color - setting border to color");
            // sets a stand-in duration (OBS wants this)
            passedElement.style.animationDuration = "60s";
            // applies the animation-less animation name/keyframes
            passedElement.style.animationName = "gradientSpinnerStop";
            // sets the colors variable to match the only color
            passedElement.style.backgroundColor = `${firstColor}`;
        }
        // if two or more colors were given
        else {
            // user inform
            console.log("Found", KFcolors.length , "colors - setting border to gradient with given colors");
            // sets the time variable dynamically (8s / color)
            passedElement.style.animationDuration = (`${KFcolors.length * 8}` + "s");
            // sets the animation name
            passedElement.style.animationName = "gradientSpinnerSpin";
            // sets the colors variable to match
            passedElement.style.backgroundImage = `conic-gradient(${KFcolors.join(", ")})`;
        }
    } // closes spinner check

    // if the element wasn't spinner (means it was; title, artist, album or progress bar)
    else {

        // sets to nothing first
        passedElement.style.backgroundImage = "none";
        passedElement.style.backgroundColor = "none";

        // if the color has been called to reset (or none were passed)
        if (KFcolors === "default") {
            // user inform
            console.log("Clearing", elementName, "color(s)");
            // if the passed element is title
            if (elementName === "title") {
                // if the config has more than 1 color stored
                console.log(dTClength)
                if (dTClength > 1) {
                    console.log("I'm there!")
                    // sets the color to default from config
                    passedElement.style.backgroundImage = `linear-gradient(22.5deg, ${defaultTitleColor})`;
                }
                // if there's less than 1 color
                else {
                    console.log("I'm here!")
                    // sets the color to default or white, if unable to use
                    passedElement.style.backgroundColor = `${defaultTitleColor}`;
                }
            }
            // if the passed element is artist or album
            else if (elementName === "artist" || elementName === "album") {
                if (dSClength > 1) {
                    // sets the color to default from config
                    passedElement.style.backgroundImage = `linear-gradient(22.5deg, ${defaultSupportColors})`;          
                }
                // if there's less than 1 color
                else {
                    // sets the color to default or white, if unable to use
                    passedElement.style.backgroundColor = defaultSupportColors || "#ffffff";
                }
            }
            // if the passed element is bar and it has more than 1 color in config
            else if (elementName === "bar") {
                // if the player is not paused, continues to check colors
                if (!isPaused) {
                    // if there's one color
                    if (dPClength > 1) {
                        // sets the color to default from config
                        passedElement.style.backgroundImage = `linear-gradient(22.5deg, ${defaultProgressColor})`;  
                    }
                    // if there's less than 1 color
                    else {
                        // sets the color to default or white, if unable to use
                        passedElement.style.backgroundColor = defaultProgressColor || "#ffffff";
                    }
                }
                // if the player *is* paused (shouldn't use custom colors, should only use pause color)
                else {
                    // sets the background color to the pause color (uses FF2C00 if none found, red)
                    passedElement.style.backgroundColor = defaultPauseColor || "#ff2c00";
                }
            }
        }
        // if only one color was given (config default, config goes straight here)
        else if (KFcolors.length === 1) {
            // user inform
            console.log("Found 1 color - setting", elementName, "to color");
            // sets the colors variable to match the only color
            passedElement.style.backgroundColor = `${KFcolors[0]}`
        }
        // if two or more colors were given
        else {
            // user inform
            console.log("Found", KFcolors.length , "colors - setting", elementName, "to gradient with given colors");
            // sets the colors variable to match
            passedElement.style.backgroundImage = `linear-gradient(22.5deg, ${KFcolors.join(", ")})`;
        }
    } // closes other elements' check
}

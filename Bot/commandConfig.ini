# This config controls the SBO Bot's command functionality
# Each command can be toggled on and off, and their cooldowns and required user levels set
# The hierarchy of "required level" is: all < subscriber < VIP/Artist < mod < lead mod < streamer
# Missing values in any field will use the default values instead
# To find out more about each command, go to https://elleffnotelf.com/guides/sbo-commands



### Debug/Test ###


[Testing]

override_Live_Checking = False
# Whether to override the live check function
# This enables all commands, regardless of stream status
# Useful for testing, recommended to keep False otherwise
# Default: False
# Accepted values: boolean (True/False)



### Requests ###


[Playlist]

enable = True
# Whether to enable the playlist command
# Default: True
# Accepted values: boolean (True/False)

cooldown_Chatter = 600
# The cooldown applied per chatter (seconds)
# Default: 600
# Accepted values: int

cooldown_Channel = 60
# The cooldown applied per channel (seconds)
# Default: 60
# Accepted values: int

required_Level = all
# The required level to use the command
# Default: all
# Accepted values: all, subscriber, VIP, mod, lead mod, streamer


